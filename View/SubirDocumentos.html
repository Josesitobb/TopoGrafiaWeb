<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topoweb Documentos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand text-white" href="../index.html">Topoweb</a>
      </div>
    </nav>

    <!-- Título -->
    <h1 class="text-center mt-4 text-primary">TOPOWEB</h1>
    <h3 class="text-center text-secondary mb-4">Documentos</h3>

    <!-- Buscador -->
    <div class="text-center mb-4">
      <input
        type="text"
        class="form-control mx-auto text-center"
        style="max-width: 300px"
        placeholder="Buscar documento"
      />
    </div>

    <!-- Tabla -->
    <div class="text-center mb-3">
      <button
        class="btn btn-success"
        data-bs-toggle="modal"
        data-bs-target="#agregarModal"
      >
        ➕ Agregar Documento
      </button>
    </div>

    <div class="container">
      <table class="table table-bordered text-center">
        <thead class="table-bordered">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Mapas de colombia</td>
            <td>
              <button
                type="button"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
              >
                <a href="#" class="text-danger me-2 text-decoration-none">
                  🗑 Eliminar
                </a>
              </button>
              <a href="#" class="text-primary text-decoration-none">
                👁 Visualizar
              </a>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>Tarea Jose poller</td>
            <td>
              <button
                type="button"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
              >
                <a href="#" class="text-danger me-2 text-decoration-none">
                  🗑 Eliminar
                </a>
              </button>
              <a
                href="../MAPA TAREA.pdf"
                target="_blank"
                class="text-primary text-decoration-none"
              >
                👁 Visualizar
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p>&copy; 2025 Mi Empresa. Todos los derechos reservados.</p>
    </footer>

    <!-- Modal -->
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              Subobjetivos
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <h4>¿Desea eliminar este documento?</h4>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              Aceptar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="agregarModal"
      tabindex="-1"
      aria-labelledby="agregarModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form>
            <div class="modal-header">
              <h5 class="modal-title" id="agregarModalLabel">
                Agregar Documento
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="nombreDoc" class="form-label"
                  >Nombre del documento</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="nombreDoc"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="archivoDoc" class="form-label"
                  >Seleccionar archivo (PDF)</label
                >
                <input
                  type="file"
                  class="form-control"
                  id="archivoDoc"
                  accept=".pdf"
                  required
                />
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
